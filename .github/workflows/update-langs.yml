name: Update language panel

on:
  schedule:
    - cron: "0 6 * * 1" # every Monday, 06:00 UTC (03:00 BRT)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate panel
        # The default GITHUB_TOKEN cannot read private repos in other orgs,
        # so a classic PAT with `repo` + `read:org` is required.
        env:
          GH_TOKEN: ${{ secrets.LANGS_TOKEN }}
        run: ./scripts/gen-langs.sh

      - name: Commit if changed
        run: |
          if git diff --quiet -- README.md; then
            echo "No language changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: refresh language panel"
          git push
